# ── Local AI Structify — Docker Compose ─────────────────────────────────
# Two services:
#   1. structify  — Streamlit application
#   2. nginx      — Reverse proxy with WebSocket support
#
# No local Ollama service is required.  The application communicates with
# a remote/compatible Ollama API via OLLAMA_BASE_URL.
# ────────────────────────────────────────────────────────────────────────

version: "3.9"

services:
  # ── Application service ─────────────────────────────────────────────
  structify:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: structify
    restart: unless-stopped

    # Mount persistent data directories so data survives container restarts
    volumes:
      - ./uploads:/app/uploads
      - ./cache:/app/cache
      - ./data:/app/data
      - ./models:/app/models
      - ./logs:/app/logs

    # Environment overrides for the application
    environment:
      # Streamlit: bind to all interfaces so nginx can proxy to it
      - STREAMLIT_SERVER_ADDRESS=0.0.0.0
      - STREAMLIT_SERVER_PORT=8501
      - STREAMLIT_SERVER_HEADLESS=true
      # Ollama API: configure your remote endpoint here
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://localhost:11434}
      - OLLAMA_API_KEY=${OLLAMA_API_KEY:-}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3.2:latest}
      # Data paths (already the defaults, explicit for clarity)
      - DATABASE_URL=sqlite:////app/data/local_ai.db
      - UPLOADS_DIR=/app/uploads
      - CACHE_DIR=/app/cache
      - DATA_DIR=/app/data
      - MODELS_DIR=/app/models
      - LOGS_DIR=/app/logs

    # Expose Streamlit port internally for nginx
    expose:
      - "8501"

  # ── Nginx reverse proxy ─────────────────────────────────────────────
  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: structify-nginx
    restart: unless-stopped

    ports:
      - "80:80"

    depends_on:
      - structify

    volumes:
      # Mount nginx configuration
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
