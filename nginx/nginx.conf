# ── Nginx Reverse Proxy Configuration for Streamlit ────────────────────
# Proxies all traffic to the Streamlit backend.
# Supports:
#   - HTTP/1.1 keep-alive
#   - WebSocket upgrade (required by Streamlit)
#   - Large uploads (file uploads up to 500 MB)
#   - Gzip compression
# ────────────────────────────────────────────────────────────────────────

upstream streamlit {
    server structify:8501;
    keepalive 32;
}

server {
    listen 80;
    server_name _;

    # ── Gzip ──────────────────────────────────────────────────────────
    gzip on;
    gzip_proxied any;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 1000;

    # ── File upload size limit ────────────────────────────────────────
    client_max_body_size 500M;

    # ── Root → Streamlit ──────────────────────────────────────────────
    location / {
        proxy_pass http://streamlit;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
        proxy_buffering off;
    }

    # ── Streamlit health endpoint ────────────────────────────────────
    location /_stcore/health {
        proxy_pass http://streamlit/_stcore/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 10s;
    }

    # ── Deny access to hidden files ──────────────────────────────────
    location ~ /\. {
        deny all;
        return 404;
    }
}
